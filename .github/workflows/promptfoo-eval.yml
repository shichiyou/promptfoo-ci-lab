name: Promptfoo Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

# --- 制約注記 ---
# 本ワークフローは file:// プロンプト展開（prepare-eval.js）を含む構造検証を行う。
# プロバイダーが ollama であるため、GitHub Actions 標準 runner 上ではモデル接続不可。
# 実際の評価実行はローカル環境（npm run eval:phase*）で実施すること。
# CI 上では「ワークフロー構造・npm scripts 連携」の検証として機能する。

jobs:
  # 全フェーズ一括実行（リグレッション）
  eval-all:
    name: Eval All Phases (Structure Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run eval:phase1
        continue-on-error: true
      - run: npm run eval:phase2
        continue-on-error: true
      - run: npm run eval:phase3
        continue-on-error: true
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-results-all
          path: promptfoo-output/

  # フェーズ1: 要件分析（PR時のみ）
  eval-phase1:
    name: Eval Phase 1 - Requirements Analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run eval:phase1
        continue-on-error: true
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-results-phase1
          path: promptfoo-output/

  # フェーズ2: 品質ゲート（push時）
  eval-phase2:
    name: Eval Phase 2 - Quality Gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run eval:phase2
        continue-on-error: true
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-results-phase2
          path: promptfoo-output/

  # フェーズ3: 実装計画（定期実行）
  eval-phase3:
    name: Eval Phase 3 - Implementation Plan
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run eval:phase3
        continue-on-error: true
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-results-phase3
          path: promptfoo-output/
